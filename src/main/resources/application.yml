spring:
  application:
    name: app
  servlet:
    multipart:
      enabled: true
      max-file-size: 30MB
      max-request-size: 35MB
      file-size-threshold: 2MB   # up to 2MB files in-RAM processing, don't save to disk

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: ClutchHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

      auto-commit: false

  jpa:
    open-in-view: false # controller LazyInitializationException protection
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate # validate only, migrations via Liquibase
    properties:
      hibernate:
        multiTenancy: DISCRIMINATOR
        tenant_identifier_resolver: com.clutch.app.config.TenantIdentifierResolver

#        jdbc.batch_size: 50
#        order_inserts: true
#        order_updates: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

  cache:
    type: redis
    time-to-live: 3600s # 1 hour
    cache-null-values: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 64
          max-idle: 16
          min-idle: 8

clutch:
  quotas:
    max-forms: 10

springdoc:
  api-docs:
    path: /v3/api-docs
    # OpenAPI 3.1 JSONB-schema validation
    version: openapi_3_1
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  scalar:
    enabled: true
    path: /scalar
